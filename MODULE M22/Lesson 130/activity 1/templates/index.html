<!DOCTYPE html>
<html>
<head>
    <title>User Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 14px; width: 360px; box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        .logo { text-align: center; font-size: 28px; font-weight: bold; color: #e74c3c; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 25px; }
        label { font-size: 13px; color: #555; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 7px; font-size: 14px; margin-bottom: 18px; }
        input:focus { outline: none; border-color: #e74c3c; }
        button { width: 100%; background: #e74c3c; color: white; border: none; padding: 12px; border-radius: 7px; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #c0392b; }
        .link { text-align: center; margin-top: 15px; font-size: 13px; color: #888; }
        .link a { color: #e74c3c; text-decoration: none; }
        {% if message %}
        .message { text-align: center; padding: 10px; background: #fdecea; color: #c0392b; border-radius: 6px; margin-bottom: 15px; font-size: 14px; }
        {% endif %}
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Codingal</div>
        <div class="subtitle">Welcome back, Aditya 👋</div>
        {% if message %}
            <div class="message">{{ message }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter username" required>
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
            <button type="submit">Login</button>
        </form>
        <div class="link">Don't have an account? <a href="/register">Register</a></div>
    </div>
</body>
</html>
