<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body { font-family: Arial; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 14px; width: 360px; }
        h2 { text-align: center; color: #2980b9; margin-bottom: 20px; }
        input { width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 7px; font-size: 14px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; background: #2980b9; color: white; border: none; padding: 12px; border-radius: 7px; font-size: 16px; cursor: pointer; }
        button:hover { background: #1a6fa0; }
        .error   { background: #fdecea; color: #c0392b; padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; font-size: 14px; }
        .success { background: #eafaf1; color: #27ae60; padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; font-size: 14px; }
        .link { text-align: center; margin-top: 15px; font-size: 13px; }
        .link a { color: #2980b9; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Create Account</h2>
        {% if message %}
            {% if success %}
                <div class="success">{{ message }}</div>
            {% else %}
                <div class="error">{{ message }}</div>
            {% endif %}
        {% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Choose a username" required>
            <input type="password" name="password" placeholder="Choose a password" required>
            <input type="password" name="confirm" placeholder="Confirm password" required>
            <button type="submit">Register</button>
        </form>
        <div class="link"><a href="/login">Already have an account? Login</a></div>
    </div>
</body>
</html>
