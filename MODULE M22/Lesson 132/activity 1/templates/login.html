<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body { font-family: Arial; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 14px; width: 360px; }
        h2 { text-align: center; color: #e74c3c; margin-bottom: 20px; }
        input { width: 100%; padding: 11px; border: 1px solid #ddd; border-radius: 7px; font-size: 14px; margin-bottom: 15px; box-sizing: border-box; }
        button { width: 100%; background: #e74c3c; color: white; border: none; padding: 12px; border-radius: 7px; font-size: 16px; cursor: pointer; }
        button:hover { background: #c0392b; }
        .error { background: #fdecea; color: #c0392b; padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center; font-size: 14px; }
        .link { text-align: center; margin-top: 15px; font-size: 13px; }
        .link a { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Codingal Login</h2>
        {% if message %}<div class="error">{{ message }}</div>{% endif %}
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="link"><a href="/register">Don't have an account? Register</a></div>
    </div>
</body>
</html>
