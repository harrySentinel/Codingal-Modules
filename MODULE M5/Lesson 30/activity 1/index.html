<!DOCTYPE html>
<html>
<body>

<h2>Form Validation</h2>

<input id="name" placeholder="Enter your name">
<button onclick="checkName()">Submit</button>
<p id="message"></p>

<script>
function checkName() {
  var name = document.getElementById("name").value;

  if (name == "") {
    document.getElementById("message").innerHTML = "Name is required";
  } else {
    document.getElementById("message").innerHTML = "Hello " + name;
  }
}
</script>

</body>
</html>
