<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Decorated Calculator</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="calculator">
    <div class="display">
      <input type="text" id="screen" placeholder="0" readonly/>
    </div>
    <div class="buttons">
      <button class="btn-clear">C</button>
      <button class="btn-operator">/</button>
      <button class="btn-operator">*</button>
      <button class="btn-operator">&#9003;</button>

      <button>7</button>
      <button>8</button>
      <button>9</button>
      <button class="btn-operator">-</button>

      <button>4</button>
      <button>5</button>
      <button>6</button>
      <button class="btn-operator">+</button>

      <button>1</button>
      <button>2</button>
      <button>3</button>
      <button class="btn-equals">=</button>

      <button class="btn-zero">0</button>
      <button>.</button>
    </div>
  </div>

</body>
</html>
