<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Social Media Section</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <section class="social-section py-5 text-center">
    <div class="container">
      <h2 class="fw-bold mb-2">Connect with Me</h2>
      <p class="text-muted mb-4">Find me on these platforms</p>
      <div class="d-flex justify-content-center gap-4 flex-wrap">
        <a href="#" class="social-icon github"><i class="fa-brands fa-github"></i></a>
        <a href="#" class="social-icon linkedin"><i class="fa-brands fa-linkedin"></i></a>
        <a href="#" class="social-icon twitter"><i class="fa-brands fa-x-twitter"></i></a>
        <a href="#" class="social-icon instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="#" class="social-icon youtube"><i class="fa-brands fa-youtube"></i></a>
      </div>
    </div>
  </section>

</body>
</html>
