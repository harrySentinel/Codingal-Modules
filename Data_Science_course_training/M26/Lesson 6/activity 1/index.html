<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Working Calculator</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="calculator">
    <div class="title"><i class="fa-solid fa-calculator"></i> Calculator</div>
    <div class="display">
      <div class="expression" id="expression"></div>
      <input type="text" id="screen" placeholder="0" readonly/>
    </div>
    <div class="buttons">
      <button class="btn-clear" onclick="clearScreen()">C</button>
      <button class="btn-operator" onclick="appendToScreen('/')"><i class="fa-solid fa-divide"></i></button>
      <button class="btn-operator" onclick="appendToScreen('*')"><i class="fa-solid fa-xmark"></i></button>
      <button class="btn-operator" onclick="deleteLast()"><i class="fa-solid fa-delete-left"></i></button>

      <button onclick="appendToScreen('7')">7</button>
      <button onclick="appendToScreen('8')">8</button>
      <button onclick="appendToScreen('9')">9</button>
      <button class="btn-operator" onclick="appendToScreen('-')"><i class="fa-solid fa-minus"></i></button>

      <button onclick="appendToScreen('4')">4</button>
      <button onclick="appendToScreen('5')">5</button>
      <button onclick="appendToScreen('6')">6</button>
      <button class="btn-operator" onclick="appendToScreen('+')"><i class="fa-solid fa-plus"></i></button>

      <button onclick="appendToScreen('1')">1</button>
      <button onclick="appendToScreen('2')">2</button>
      <button onclick="appendToScreen('3')">3</button>
      <button class="btn-equals" onclick="calculate()"><i class="fa-solid fa-equals"></i></button>

      <button class="btn-zero" onclick="appendToScreen('0')">0</button>
      <button onclick="appendToScreen('.')">.</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
